name: CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'CHANGES'
      - '.devcontainer/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'CHANGES'
      - '.devcontainer/**'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & test (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: centos:6
            label: CentOS 6 / Apache 2.2
          - image: centos:7
            label: CentOS 7 / Apache 2.4
    steps:
      - uses: actions/checkout@v5

      # The module supports both the Apache 2.2 API (connection->remote_ip) and
      # the Apache 2.4 API (useragent_ip) via compile-time macros, so it is
      # built and tested in both a CentOS 6 (2.2) and a CentOS 7 (2.4)
      # container. Checkout runs on the host to avoid the legacy containers'
      # old glibc; the build/test runs in the container against the mounted
      # workspace.
      - name: Build and run functional tests
        run: |
          docker run --rm --platform linux/amd64 \
            -v "${{ github.workspace }}":/work -w /work \
            ${{ matrix.image }} bash test/run-ci.sh
